blueprint:
  name: Violet Pool - Smart pH Control
  description: |
    Automatic pH value control with smart dosing of pH+ and pH-.
    Monitors pH values and doses automatically when deviations from the target range occur.
    
    REQUIRED: input_number.pool_ph_dosing_counter Helper (see blueprints/README.md)
    
    VERSION: 1.0.5 (2026-04-22)
  domain: automation
  source_url: https://github.com/xerolux/violet-hass/blob/main/blueprints/automation/pool_ph_control.yaml
  homeassistant:
    min_version: "2024.6.0"
  input:
    ph_sensor:
      name: pH Sensor
      description: Sensor for the current pH value of the pool
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: sensor
            - device_class: ph
    ph_setpoint_entity:
      name: pH Setpoint
      description: Number entity for the pH target value
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: number
    ph_minus_switch:
      name: pH- Dosing
      description: Switch for pH-Minus dosing
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: switch
    ph_plus_switch:
      name: pH+ Dosing
      description: Switch for pH-Plus dosing
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: switch
    ph_tolerance:
      name: pH Tolerance
      description: Tolerance range around the setpoint (±)
      default: 0.2
      selector:
        number:
          min: 0.05
          max: 0.5
          step: 0.05
          unit_of_measurement: pH
          mode: slider
    dosing_duration_ph_minus:
      name: Dosing Duration pH-
      description: Duration of pH-Minus dosing in seconds
      default: 30
      selector:
        number:
          min: 10
          max: 300
          step: 5
          unit_of_measurement: s
          mode: box
    dosing_duration_ph_plus:
      name: Dosing Duration pH+
      description: Duration of pH-Plus dosing in seconds
      default: 30
      selector:
        number:
          min: 10
          max: 300
          step: 5
          unit_of_measurement: s
          mode: box
    max_dosing_per_day:
      name: Max. Dosing per Day
      description: Maximum number of dosing cycles per 24h as a safety limit
      default: 10
      selector:
        number:
          min: 3
          max: 20
          step: 1
          mode: box
    min_wait_between_dosing:
      name: Wait Time Between Dosing
      description: Minimum wait time between dosing cycles in minutes
      default: 60
      selector:
        number:
          min: 30
          max: 240
          step: 15
          unit_of_measurement: min
          mode: box
    enable_pump_check:
      name: Enable Pump Check
      description: Only dose when the filter pump is running
      default: true
      selector:
        boolean:
    pump_entity:
      name: Filter Pump (Optional)
      description: Binary sensor or switch of the filter pump
      default: ""
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: 
                - binary_sensor
                - switch
          multiple: false
    notification_entity:
      name: Notification Service (Optional)
      description: Service for notifications
      default: ""
      selector:
        text:

variables:
  ph_current_sensor: !input ph_sensor
  ph_target_entity: !input ph_setpoint_entity
  ph_minus_entity: !input ph_minus_switch
  ph_plus_entity: !input ph_plus_switch
  tolerance: !input ph_tolerance
  dosing_duration_minus: !input dosing_duration_ph_minus
  dosing_duration_plus: !input dosing_duration_ph_plus
  max_daily_dosing: !input max_dosing_per_day
  min_wait_minutes: !input min_wait_between_dosing
  pump_check_enabled: !input enable_pump_check
  pump_sensor: !input pump_entity
  notify_service: !input notification_entity
  
  # pH values
  current_ph: "{{ states(ph_current_sensor) | float(7.2) }}"
  target_ph: "{{ states(ph_target_entity) | float(7.2) }}"
  ph_diff: "{{ current_ph - target_ph }}"
  
  # Ranges
  ph_too_high: "{{ ph_diff > tolerance }}"
  ph_too_low: "{{ ph_diff < -tolerance }}"
  ph_ok: "{{ abs(ph_diff) <= tolerance }}"
  
  # Pump status
  pump_running: >
    {% if not pump_check_enabled or pump_sensor == "" %}
      true
    {% else %}
      {{ is_state(pump_sensor, 'on') }}
    {% endif %}
  
  # Dosing counter (via Input Number Helper)
  dosing_counter_today: >
    {{ states('input_number.pool_ph_dosing_counter') | int(0) }}

trigger:
  - platform: numeric_state
    entity_id: !input ph_sensor
    for:
      minutes: 10
    id: ph_changed
  - platform: time_pattern
    minutes: /15
    id: periodic_check
  - platform: state
    entity_id: !input pump_entity
    to: "on"
    for:
      minutes: 5
    id: pump_started

condition:
  - condition: template
    value_template: >
      {{ states(ph_current_sensor) not in ['unavailable', 'unknown'] and
         states(ph_target_entity) not in ['unavailable', 'unknown'] }}

action:
  - choose:
      # === pH too high: Dose pH-Minus ===
      - conditions:
          - condition: template
            value_template: "{{ ph_too_high and pump_running }}"
          - condition: template
            value_template: "{{ dosing_counter_today < max_daily_dosing }}"
          - condition: template
            value_template: >
              {{ (now() - states.automation.pool_ph_control.attributes.last_triggered | default(now() - timedelta(hours=1))) > 
                 timedelta(minutes=min_wait_minutes) }}
        sequence:
          - service: violet_pool_controller.manual_dosing
            target:
              entity_id: "{{ ph_minus_entity }}"
            data:
              duration_seconds: "{{ dosing_duration_minus }}"
          
          # Increment counter
          - service: input_number.set_value
            target:
              entity_id: input_number.pool_ph_dosing_counter
            data:
              value: "{{ dosing_counter_today + 1 }}"
          
          # Notification
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🔻 pH Correction"
                  message: >
                    pH too high: {{ '%.2f' | format(current_ph) }} → {{ '%.2f' | format(target_ph) }}
                    pH-Minus dosed for {{ dosing_duration_minus }}s

      # === pH too low: Dose pH-Plus ===
      - conditions:
          - condition: template
            value_template: "{{ ph_too_low and pump_running }}"
          - condition: template
            value_template: "{{ dosing_counter_today < max_daily_dosing }}"
          - condition: template
            value_template: >
              {{ (now() - states.automation.pool_ph_control.attributes.last_triggered | default(now() - timedelta(hours=1))) > 
                 timedelta(minutes=min_wait_minutes) }}
        sequence:
          - service: violet_pool_controller.manual_dosing
            target:
              entity_id: "{{ ph_plus_entity }}"
            data:
              duration_seconds: "{{ dosing_duration_plus }}"
          
          # Increment counter
          - service: input_number.set_value
            target:
              entity_id: input_number.pool_ph_dosing_counter
            data:
              value: "{{ dosing_counter_today + 1 }}"
          
          # Notification
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🔺 pH Correction"
                  message: >
                    pH too low: {{ '%.2f' | format(current_ph) }} → {{ '%.2f' | format(target_ph) }}
                    pH-Plus dosed for {{ dosing_duration_plus }}s

      # === Maximum dosing reached ===
      - conditions:
          - condition: template
            value_template: "{{ not ph_ok and dosing_counter_today >= max_daily_dosing }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "⚠️ pH Dosing Stopped"
                  message: >
                    Maximum dosing cycles ({{ max_daily_dosing }}) reached for today.
                    pH: {{ '%.2f' | format(current_ph) }}, Target: {{ '%.2f' | format(target_ph) }}
                    Manual check required!

      # === pH within target range ===
      - conditions:
          - condition: template
            value_template: "{{ ph_ok }}"
          - condition: trigger
            id: ph_changed
        sequence:
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "✅ pH Value Optimal"
                  message: "pH value within target range: {{ '%.2f' | format(current_ph) }} (Target: {{ '%.2f' | format(target_ph) }})"

  # Reset counter at midnight
  - if:
      - condition: template
        value_template: "{{ now().hour == 0 and now().minute == 0 }}"
    then:
      - service: input_number.set_value
        target:
          entity_id: input_number.pool_ph_dosing_counter
        data:
          value: 0

mode: single
max_exceeded: silent
