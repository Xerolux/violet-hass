blueprint:
  name: Violet Pool - Automatic Backwash
  description: |
    Smart automatic backwash based on filter pressure, runtime, and schedule.
    Includes backwash and rinse cycles with safety features.
    
    REQUIRED: 
    - input_datetime.pool_last_backwash Helper (see blueprints/README.md)
    - input_number.pool_pump_runtime_hours Helper (optional, for runtime-based control)
    
    VERSION: 1.0.5 (2026-04-22)
  domain: automation
  source_url: https://github.com/xerolux/violet-hass/blob/main/blueprints/automation/pool_backwash_control.yaml
  homeassistant:
    min_version: "2024.6.0"
  input:
    backwash_switch:
      name: Backwash Switch
      description: Switch for backwashing
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: switch
    rinse_switch:
      name: Rinse Switch (Optional)
      description: Switch for rinsing
      default: ""
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: switch
          multiple: false
    pump_switch:
      name: Pump Switch
      description: Main pool pump
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: switch
    filter_pressure_sensor:
      name: Filter Pressure Sensor (Optional)
      description: Sensor for the current filter pressure
      default: ""
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: sensor
          multiple: false
    
    # === Pressure-Based Control ===
    enable_pressure_control:
      name: Pressure-Based Backwash
      description: Automatic backwash when filter pressure is too high
      default: true
      selector:
        boolean:
    max_filter_pressure:
      name: Maximum Filter Pressure
      description: Pressure at which backwash is triggered
      default: 1.5
      selector:
        number:
          min: 0.8
          max: 3.0
          step: 0.1
          unit_of_measurement: "bar"
          mode: slider
    
    # === Schedule-Based Control ===
    enable_scheduled_backwash:
      name: Scheduled Backwash
      description: Backwash at fixed intervals
      default: true
      selector:
        boolean:
    backwash_interval_days:
      name: Backwash Interval
      description: Interval between backwashes in days
      default: 7
      selector:
        number:
          min: 3
          max: 21
          step: 1
          unit_of_measurement: "days"
          mode: box
    backwash_time:
      name: Backwash Time
      description: Preferred time for scheduled backwash
      default: "03:00"
      selector:
        time:
    
    # === Runtime-Based Control ===
    enable_runtime_control:
      name: Runtime-Based Backwash
      description: Backwash after a certain pump runtime
      default: false
      selector:
        boolean:
    max_pump_runtime_hours:
      name: Maximum Pump Runtime
      description: Pump runtime until next backwash
      default: 168
      selector:
        number:
          min: 48
          max: 336
          step: 12
          unit_of_measurement: "hours"
          mode: box
    
    # === Backwash Parameters ===
    backwash_duration:
      name: Backwash Duration
      description: Duration of backwash in seconds
      default: 120
      selector:
        number:
          min: 30
          max: 300
          step: 15
          unit_of_measurement: "s"
          mode: box
    rinse_duration:
      name: Rinse Duration
      description: Duration of rinse in seconds
      default: 30
      selector:
        number:
          min: 10
          max: 120
          step: 5
          unit_of_measurement: "s"
          mode: box
    pre_backwash_pump_off_time:
      name: Pump Stop Before Backwash
      description: Time the pump is stopped before backwash
      default: 30
      selector:
        number:
          min: 10
          max: 120
          step: 10
          unit_of_measurement: "s"
          mode: box
    post_backwash_pump_start_delay:
      name: Pump Start After Backwash
      description: Wait time before pump restarts after backwash
      default: 60
      selector:
        number:
          min: 30
          max: 300
          step: 15
          unit_of_measurement: "s"
          mode: box
    
    # === Safety ===
    enable_water_level_check:
      name: Water Level Check
      description: Only backwash when water level is sufficient
      default: false
      selector:
        boolean:
    water_level_sensor:
      name: Water Level Sensor (Optional)
      description: Sensor for the pool water level
      default: ""
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: sensor
          multiple: false
    min_water_level:
      name: Minimum Water Level
      description: Minimum water level for backwash
      default: 50
      selector:
        number:
          min: 20
          max: 100
          step: 5
          unit_of_measurement: "cm"
          mode: box
    
    # === Notifications ===
    notification_entity:
      name: Notification Service (Optional)
      description: Service for backwash notifications
      default: ""
      selector:
        text:
    notify_before_backwash:
      name: Pre-Notification
      description: Notification before automatic backwash
      default: true
      selector:
        boolean:
    notify_after_backwash:
      name: Completion Notification
      description: Notification after backwash is completed
      default: true
      selector:
        boolean:

variables:
  backwash_entity: !input backwash_switch
  rinse_entity: !input rinse_switch
  pump_entity: !input pump_switch
  pressure_sensor: !input filter_pressure_sensor
  water_level_sensor_entity: !input water_level_sensor
  notify_service: !input notification_entity
  
  # Current status
  current_pressure: >
    {{ states(pressure_sensor) | float(0) if pressure_sensor != "" else 0 }}
  current_water_level: >
    {{ states(water_level_sensor_entity) | float(100) if water_level_sensor_entity != "" else 100 }}
  pump_is_running: "{{ is_state(pump_entity, 'on') }}"
  
  # Check conditions
  pressure_too_high: >
    {{ enable_pressure_control and pressure_sensor != "" and current_pressure > max_filter_pressure }}
  water_level_ok: >
    {{ not enable_water_level_check or water_level_sensor_entity == "" or current_water_level >= min_water_level }}
  
  # Time calculation for next scheduled backwash
  last_backwash: >
    {{ states('input_datetime.pool_last_backwash') | as_datetime | default(now() - timedelta(days=backwash_interval_days + 1)) }}
  days_since_backwash: >
    {{ (now() - last_backwash).days }}
  scheduled_backwash_due: >
    {{ enable_scheduled_backwash and days_since_backwash >= backwash_interval_days }}
  
  # Runtime-based check (requires Pump Runtime Sensor)
  pump_runtime_hours: >
    {{ states('sensor.pool_pump_runtime_hours') | float(0) }}
  runtime_backwash_due: >
    {{ enable_runtime_control and pump_runtime_hours >= max_pump_runtime_hours }}

trigger:
  # Pressure-based trigger
  - platform: numeric_state
    entity_id: !input filter_pressure_sensor
    above: !input max_filter_pressure
    for:
      minutes: 15
    id: pressure_high
  
  # Schedule-based trigger
  - platform: time
    at: !input backwash_time
    id: scheduled_time
  
  # Periodic check every 6 hours
  - platform: time_pattern
    hours: /6
    id: periodic_check
  
  # Pump status change
  - platform: state
    entity_id: !input pump_switch
    from: "on"
    to: "off"
    for:
      minutes: 5
    id: pump_stopped

condition:
  - condition: template
    value_template: >
      {{ states(backwash_entity) not in ['unavailable', 'unknown'] and
         states(pump_entity) not in ['unavailable', 'unknown'] }}

action:
  - choose:
      # === Pressure-triggered backwash ===
      - conditions:
          - condition: trigger
            id: pressure_high
          - condition: template
            value_template: "{{ pressure_too_high and water_level_ok }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ notify_service != '' and notify_before_backwash }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🔄 Automatic Backwash Starting"
                  message: >
                    Filter pressure too high: {{ current_pressure }} bar (Max: {{ max_filter_pressure }} bar)
                    Backwash will start automatically.
          - perform: backwash_cycle

      # === Scheduled backwash ===
      - conditions:
          - condition: trigger
            id: scheduled_time
          - condition: template
            value_template: "{{ scheduled_backwash_due and water_level_ok }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ notify_service != '' and notify_before_backwash }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🕐 Scheduled Backwash"
                  message: >
                    Last backwash was {{ days_since_backwash }} days ago
                    Scheduled backwash is starting.
          - perform: backwash_cycle

      # === Runtime-triggered backwash ===
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ runtime_backwash_due and water_level_ok }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ notify_service != '' and notify_before_backwash }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "⏱️ Runtime-Based Backwash"
                  message: >
                    Pump runtime: {{ pump_runtime_hours }}h (Max: {{ max_pump_runtime_hours }}h)
                    Backwash is starting.
          - perform: backwash_cycle

      # === Water level too low ===
      - conditions:
          - condition: template
            value_template: "{{ not water_level_ok and enable_water_level_check }}"
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ pressure_too_high }}"
              - condition: template
                value_template: "{{ scheduled_backwash_due }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "⚠️ Backwash Cancelled"
                  message: >
                    Water level too low: {{ current_water_level }}cm (Min: {{ min_water_level }}cm)
                    Please refill water before backwashing.

mode: single
max_exceeded: silent

# =============================================================================
# NOTE FOR DEVELOPERS:
# =============================================================================
# The 'backwash_cycle' sequence below is not valid Blueprint code.
# Home Assistant Blueprints do not support defining reusable scripts.
# 
# SOLUTION: Create a separate script in your configuration.yaml:
# 
# script:
#   pool_backwash_cycle:
#     sequence:
#       - service: switch.turn_off
#         target:
#           entity_id: switch.violet_pool_controller_pump
#       - delay:
#           seconds: 30
#       # ... rest of backwash sequence
# 
# Then replace '- perform: backwash_cycle' with:
# - service: script.turn_on
#   target:
#     entity_id: script.pool_backwash_cycle
# =============================================================================
