blueprint:
  name: Violet Pool - Smart Cover Control
  description: |
    Automatic pool cover control based on weather, temperature, time, and pool status.
    Protects against rain, saves energy, and keeps the water clean.
    
    VERSION: 1.0.5 (2026-04-22)
  domain: automation
  source_url: https://github.com/xerolux/violet-hass/blob/main/blueprints/automation/pool_cover_control.yaml
  homeassistant:
    min_version: "2024.6.0"
  input:
    pool_cover:
      name: Pool Cover
      description: Cover entity of the pool cover
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: cover
    pool_temperature_sensor:
      name: Pool Temperature Sensor
      description: Sensor for the water temperature
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: sensor
            - device_class: temperature
    outside_temp_sensor:
      name: Outside Temperature Sensor
      description: Sensor for the outside temperature
      selector:
        entity:
          filter:
            - domain: sensor
            - device_class: temperature
    weather_entity:
      name: Weather Entity
      description: Weather integration for rain forecast
      selector:
        entity:
          filter:
            - domain: weather
    pump_entity:
      name: Pool Pump (Optional)
      description: Pump status for smart control
      default: ""
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: 
                - switch
                - binary_sensor
          multiple: false
    
    # === Time Control ===
    auto_close_time:
      name: Auto Close Time
      description: Time for automatic closing of the cover
      default: "22:00"
      selector:
        time:
    auto_open_time:
      name: Auto Open Time
      description: Time for automatic opening of the cover
      default: "08:00"
      selector:
        time:
    weekend_open_time:
      name: Weekend Open Time
      description: Later opening time on weekends
      default: "10:00"
      selector:
        time:
    
    # === Weather-Based Control ===
    enable_weather_control:
      name: Weather-Based Control
      description: Close cover automatically in bad weather
      default: true
      selector:
        boolean:
    rain_threshold:
      name: Rain Threshold
      description: Rain probability for automatic closing (%)
      default: 70
      selector:
        number:
          min: 30
          max: 100
          step: 10
          unit_of_measurement: "%"
          mode: slider
    wind_speed_threshold:
      name: Wind Speed Threshold
      description: Wind speed for automatic closing
      default: 25
      selector:
        number:
          min: 10
          max: 50
          step: 5
          unit_of_measurement: "km/h"
          mode: slider
    
    # === Temperature-Based Control ===
    enable_temp_control:
      name: Temperature-Based Control
      description: Close cover automatically at low temperatures
      default: true
      selector:
        boolean:
    min_outside_temp:
      name: Minimum Outside Temperature
      description: Outside temperature below which the cover closes automatically
      default: 5
      selector:
        number:
          min: -5
          max: 15
          step: 1
          unit_of_measurement: "°C"
          mode: slider
    max_temp_difference:
      name: Max Temperature Difference
      description: Maximum difference between pool and outside temperature for closing
      default: 15
      selector:
        number:
          min: 5
          max: 25
          step: 1
          unit_of_measurement: "°C"
          mode: slider
    
    # === Safety & Comfort ===
    enable_pump_interlock:
      name: Pump Interlock
      description: Do not close cover while pump is running
      default: true
      selector:
        boolean:
    enable_manual_override:
      name: Manual Override
      description: Pause automation after manual operation
      default: true
      selector:
        boolean:
    manual_override_duration:
      name: Override Duration
      description: Duration of automation pause after manual operation
      default: 120
      selector:
        number:
          min: 30
          max: 480
          step: 30
          unit_of_measurement: "min"
          mode: box
    
    # === Notifications ===
    notification_entity:
      name: Notification Service (Optional)
      description: Service for status notifications
      default: ""
      selector:
        text:
    notify_on_weather_close:
      name: Weather Notifications
      description: Notification when closed due to weather
      default: true
      selector:
        boolean:
    notify_on_temp_close:
      name: Temperature Notifications
      description: Notification when closed due to temperature
      default: true
      selector:
        boolean:

variables:
  cover_entity: !input pool_cover
  pool_temp_sensor: !input pool_temperature_sensor
  outside_temp_sensor: !input outside_temp_sensor
  weather_entity: !input weather_entity
  pump_sensor: !input pump_entity
  notify_service: !input notification_entity
  
  # Time variables
  is_weekend: "{{ now().weekday() in [5, 6] }}"  # Saturday, Sunday
  open_time: >
    {% if is_weekend %}
      {{ (weekend_open_time | as_datetime).time() }}
    {% else %}
      {{ (auto_open_time | as_datetime).time() }}
    {% endif %}
  close_time: "{{ (auto_close_time | as_datetime).time() }}"
  is_day_time: >
    {{ now().time() >= open_time and now().time() < close_time }}
  
  # Temperature variables
  pool_temp: "{{ states(pool_temp_sensor) | float(20) }}"
  outside_temp: "{{ states(outside_temp_sensor) | float(20) }}"
  temp_diff: "{{ pool_temp - outside_temp }}"
  
  # Weather variables
  weather_condition: "{{ states(weather_entity) }}"
  weather_attrs: "{{ state_attr(weather_entity, '') }}"
  rain_probability: "{{ state_attr(weather_entity, 'forecast')[0].precipitation_probability | default(0) }}"
  wind_speed: "{{ state_attr(weather_entity, 'wind_speed') | default(0) }}"
  
  # Status variables
  cover_state: "{{ states(cover_entity) }}"
  is_cover_open: "{{ cover_state == 'open' }}"
  is_cover_closed: "{{ cover_state == 'closed' }}"
  is_cover_moving: "{{ cover_state in ['opening', 'closing'] }}"
  
  # Pump status
  pump_running: >
    {% if pump_sensor == "" %}
      false
    {% else %}
      {{ is_state(pump_sensor, 'on') }}
    {% endif %}
  
  # Decision logic
  should_close_weather: >
    {{ enable_weather_control and (
       weather_condition in ['rainy', 'snowy', 'hail'] or
       rain_probability > rain_threshold or
       wind_speed > wind_speed_threshold
    ) }}
  
  should_close_temp: >
    {{ enable_temp_control and (
       outside_temp < min_outside_temp or
       temp_diff > max_temp_difference
    ) }}
  
  should_close_time: "{{ not is_day_time }}"
  should_open_time: "{{ is_day_time }}"
  
  can_move_cover: >
    {{ not is_cover_moving and 
       (not enable_pump_interlock or not pump_running) }}

trigger:
  # Time-based triggers
  - platform: time
    at: !input auto_open_time
    id: time_open_weekday
  - platform: time
    at: !input weekend_open_time
    id: time_open_weekend
  - platform: time
    at: !input auto_close_time
    id: time_close
  
  # Weather-based triggers
  - platform: state
    entity_id: !input weather_entity
    for:
      minutes: 5
    id: weather_changed
  - platform: numeric_state
    entity_id: !input weather_entity
    attribute: wind_speed
    above: !input wind_speed_threshold
    for:
      minutes: 10
    id: high_wind
  
  # Temperature-based triggers
  - platform: numeric_state
    entity_id: !input outside_temp_sensor
    below: !input min_outside_temp
    for:
      minutes: 15
    id: temp_too_low
  - platform: template
    value_template: >
      {{ (states(pool_temp_sensor) | float(20)) - (states(outside_temp_sensor) | float(20)) > max_temp_difference }}
    for:
      minutes: 20
    id: temp_diff_high
  
  # Pump status trigger
  - platform: state
    entity_id: !input pump_entity
    to: "off"
    for:
      minutes: 5
    id: pump_stopped
  
  # Periodic check
  - platform: time_pattern
    minutes: /30
    id: periodic_check

condition:
  - condition: template
    value_template: >
      {{ states(cover_entity) not in ['unavailable', 'unknown'] }}

action:
  - choose:
      # === Automatic opening at scheduled time ===
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: time_open_weekday
              - condition: trigger
                id: time_open_weekend
          - condition: template
            value_template: "{{ can_move_cover and is_cover_closed }}"
          - condition: template
            value_template: "{{ not (should_close_weather or should_close_temp) }}"
        sequence:
          - service: cover.open_cover
            target:
              entity_id: !input pool_cover
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🌅 Pool Cover Opened"
                  message: >
                    Cover opened automatically at scheduled time
                    ({{ open_time.strftime('%H:%M') }})

      # === Automatic closing at nighttime ===
      - conditions:
          - condition: trigger
            id: time_close
          - condition: template
            value_template: "{{ can_move_cover and is_cover_open }}"
        sequence:
          - service: cover.close_cover
            target:
              entity_id: !input pool_cover
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🌙 Pool Cover Closed"
                  message: >
                    Cover closed automatically for nighttime
                    ({{ close_time.strftime('%H:%M') }})

      # === Weather-triggered closing ===
      - conditions:
          - condition: template
            value_template: "{{ should_close_weather and can_move_cover and is_cover_open }}"
          - condition: or
            conditions:
              - condition: trigger
                id: weather_changed
              - condition: trigger
                id: high_wind
              - condition: trigger
                id: periodic_check
        sequence:
          - service: cover.close_cover
            target:
              entity_id: !input pool_cover
          - if:
              - condition: template
                value_template: "{{ notify_service != '' and notify_on_weather_close }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🌧️ Weather Protection Activated"
                  message: >
                    Cover closed due to bad weather
                    Condition: {{ weather_condition }}, Rain: {{ rain_probability }}%, Wind: {{ wind_speed }} km/h

      # === Temperature-triggered closing ===
      - conditions:
          - condition: template
            value_template: "{{ should_close_temp and can_move_cover and is_cover_open }}"
          - condition: or
            conditions:
              - condition: trigger
                id: temp_too_low
              - condition: trigger
                id: temp_diff_high
              - condition: trigger
                id: periodic_check
        sequence:
          - service: cover.close_cover
            target:
              entity_id: !input pool_cover
          - if:
              - condition: template
                value_template: "{{ notify_service != '' and notify_on_temp_close }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🌡️ Temperature Protection Activated"
                  message: >
                    Cover closed due to low temperatures
                    Outside: {{ outside_temp }}°C, Pool: {{ pool_temp }}°C, Difference: {{ temp_diff }}°C

      # === Open after pump stop (if previously blocked) ===
      - conditions:
          - condition: trigger
            id: pump_stopped
          - condition: template
            value_template: "{{ should_open_time and is_cover_closed and enable_pump_interlock }}"
          - condition: template
            value_template: "{{ not (should_close_weather or should_close_temp) }}"
        sequence:
          - delay:
              minutes: 2  # Short wait after pump stop
          - service: cover.open_cover
            target:
              entity_id: !input pool_cover
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "💡 Cover Opened After Pump Stop"
                  message: "Cover opened after pump operation ended"

      # === Warning when movement is blocked ===
      - conditions:
          - condition: template
            value_template: "{{ enable_pump_interlock and pump_running and (should_close_weather or should_close_temp) }}"
          - condition: trigger
            id: periodic_check
        sequence:
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "⚠️ Cover Blocked"
                  message: >
                    Cover should be closed, but the pump is still running.
                    Please stop the pump manually or disable the interlock.

mode: single
max_exceeded: silent
