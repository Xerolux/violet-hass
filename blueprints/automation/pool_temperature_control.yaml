blueprint:
  name: Violet Pool - Smart Temperature Control
  description: |
    Automatic pool temperature control based on time of day, weather, and solar energy.
    Supports both heater and solar absorber with smart energy management.
    
    VERSION: 1.0.5 (2026-04-22)
  domain: automation
  source_url: https://github.com/xerolux/violet-hass/blob/main/blueprints/automation/pool_temperature_control.yaml
  homeassistant:
    min_version: "2024.6.0"
  input:
    pool_temperature_sensor:
      name: Pool Temperature Sensor
      description: Sensor for the current pool temperature
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: sensor
            - device_class: temperature
    pool_heater:
      name: Pool Heater
      description: Climate entity for the pool heater
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: climate
    pool_solar:
      name: Solar Absorber (Optional)
      description: Climate entity for the solar absorber
      default: ""
      selector:
        entity:
          filter:
            - integration: violet_pool_controller
            - domain: climate
          multiple: false
    target_temp_day:
      name: Target Temperature Day
      description: Desired temperature during the day
      default: 26
      selector:
        number:
          min: 20
          max: 35
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    target_temp_night:
      name: Target Temperature Night
      description: Desired temperature during the night
      default: 24
      selector:
        number:
          min: 18
          max: 30
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    day_start_time:
      name: Day Start Time
      description: Time when the day temperature is activated
      default: "07:00"
      selector:
        time:
    night_start_time:
      name: Night Start Time
      description: Time when the night temperature is activated
      default: "22:00"
      selector:
        time:
    outside_temp_sensor:
      name: Outside Temperature Sensor (Optional)
      description: Sensor for the outside temperature for smart control
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
            - device_class: temperature
          multiple: false
    solar_power_sensor:
      name: Solar Power Sensor (Optional)
      description: Sensor for the current solar power output
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
            - device_class: power
          multiple: false
    min_solar_power:
      name: Minimum Solar Power
      description: Minimum power in watts for effective solar heating
      default: 1000
      selector:
        number:
          min: 500
          max: 5000
          step: 100
          unit_of_measurement: W
          mode: box
    energy_saving_mode:
      name: Energy Saving Mode
      description: Enables smart energy saving features
      default: true
      selector:
        boolean:
    max_temp_difference:
      name: Maximum Temperature Difference
      description: Maximum deviation from target temperature before heater is activated
      default: 2.0
      selector:
        number:
          min: 0.5
          max: 5.0
          step: 0.5
          unit_of_measurement: °C
          mode: slider
    notification_entity:
      name: Notification Service (Optional)
      description: Service for notifications (e.g. notify.mobile_app_phone)
      default: ""
      selector:
        text:

variables:
  pool_temp_sensor: !input pool_temperature_sensor
  heater_entity: !input pool_heater
  solar_entity: !input pool_solar
  target_day: !input target_temp_day
  target_night: !input target_temp_night
  outside_sensor: !input outside_temp_sensor
  solar_sensor: !input solar_power_sensor
  min_solar: !input min_solar_power
  energy_saving: !input energy_saving_mode
  max_diff: !input max_temp_difference
  notify_service: !input notification_entity
  
  # Time-based variables
  is_day: >
    {{ now().time() >= (day_start_time | as_datetime).time() and 
       now().time() < (night_start_time | as_datetime).time() }}
  target_temp: "{{ target_day if is_day else target_night }}"
  
  # Temperature variables
  current_temp: "{{ states(pool_temp_sensor) | float(0) }}"
  temp_diff: "{{ target_temp - current_temp }}"
  
  # External sensors
  outside_temp: >
    {{ states(outside_sensor) | float(20) if outside_sensor and outside_sensor != "" else 20 }}
  solar_power: >
    {{ states(solar_sensor) | float(0) if solar_sensor and solar_sensor != "" else 0 }}
  
  # Solar availability
  solar_available: >
    {{ solar_power > min_solar and outside_temp > 15 and 
       solar_entity and solar_entity != "" }}

trigger:
  - platform: time
    at: !input day_start_time
    id: day_start
  - platform: time
    at: !input night_start_time
    id: night_start
  - platform: numeric_state
    entity_id: !input pool_temperature_sensor
    for:
      minutes: 5
    id: temp_change
  - platform: state
    entity_id: !input solar_power_sensor
    for:
      minutes: 2
    id: solar_change
    not_to:
      - "unavailable"
      - "unknown"
  - platform: time_pattern
    minutes: /30
    id: periodic_check

condition:
  - condition: template
    value_template: >
      {{ states(heater_entity) not in ['unavailable', 'unknown'] }}

action:
  - choose:
      # === Day start: Set day temperature ===
      - conditions:
          - condition: trigger
            id: day_start
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input pool_heater
            data:
              temperature: "{{ target_day }}"
          - if: 
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🌅 Pool Temperature"
                  message: "Day temperature set to {{ target_day }}°C"

      # === Night start: Set night temperature ===
      - conditions:
          - condition: trigger
            id: night_start
        sequence:
          - service: climate.set_temperature
            target:
              entity_id: !input pool_heater
            data:
              temperature: "{{ target_night }}"
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "🌙 Pool Temperature"
                  message: "Night temperature set to {{ target_night }}°C"

      # === Temperature too low: Activate heater ===
      - conditions:
          - condition: template
            value_template: "{{ temp_diff > max_diff }}"
          - condition: or
            conditions:
              - condition: trigger
                id: temp_change
              - condition: trigger
                id: periodic_check
              - condition: trigger
                id: solar_change
        sequence:
          - choose:
              # Solar available and sufficient: Prefer solar
              - conditions:
                  - condition: template
                    value_template: "{{ solar_available }}"
                sequence:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: "{{ solar_entity }}"
                    data:
                      hvac_mode: heat
                  - service: climate.set_temperature
                    target:
                      entity_id: "{{ solar_entity }}"
                    data:
                      temperature: "{{ target_temp }}"
                  # Heater to auto or off, depending on energy saving mode
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: !input pool_heater
                    data:
                      hvac_mode: "{{ 'auto' if energy_saving else 'heat' }}"
                  - if:
                      - condition: template
                        value_template: "{{ notify_service != '' }}"
                    then:
                      - service: "{{ notify_service }}"
                        data:
                          title: "☀️ Solar Heating"
                          message: "Solar activated ({{ solar_power }}W), target: {{ target_temp }}°C"
            # No solar available: Use regular heater
            default:
              - service: climate.set_hvac_mode
                target:
                  entity_id: !input pool_heater
                data:
                  hvac_mode: heat
              - service: climate.set_temperature
                target:
                  entity_id: !input pool_heater
                data:
                  temperature: "{{ target_temp }}"
              # Large temperature difference: Warning
              - if:
                  - condition: template
                    value_template: "{{ notify_service != '' and temp_diff > (max_diff * 1.5) }}"
                then:
                  - service: "{{ notify_service }}"
                    data:
                      title: "🔥 Pool Heater Activated"
                      message: "Temperature: {{ current_temp }}°C → {{ target_temp }}°C (Δ{{ '%.1f' | format(temp_diff) }}°C)"

      # === Target temperature reached: Energy saving mode ===
      - conditions:
          - condition: template
            value_template: "{{ temp_diff <= 0.5 and energy_saving }}"
          - condition: or
            conditions:
              - condition: trigger
                id: temp_change
              - condition: trigger
                id: periodic_check
        sequence:
          - service: climate.set_hvac_mode
            target:
              entity_id: !input pool_heater
            data:
              hvac_mode: auto
          - if:
              - condition: template
                value_template: "{{ solar_entity and solar_entity != '' }}"
            then:
              - service: climate.set_hvac_mode
                target:
                  entity_id: "{{ solar_entity }}"
                data:
                  hvac_mode: auto
          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "✅ Pool Temperature Reached"
                  message: "Target temperature {{ target_temp }}°C reached, energy saving mode activated"

mode: single
max_exceeded: silent
