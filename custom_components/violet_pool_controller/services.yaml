# Services for Violet Pool Controller
control_pump:
  name: Pump Control
  description: Control the pool pump with advanced options
  target:
    entity:
      integration: violet_pool_controller
      domain: switch
  fields:
    action:
      description: Control action
      required: true
      selector:
        select:
          options:
            - speed_control
            - force_off
            - eco_mode
            - boost_mode
            - auto
    speed:
      description: Pump speed (1-3)
      default: 2
      selector:
        number:
          min: 1
          max: 3
          mode: slider
    duration:
      description: Duration in seconds
      default: 0
      selector:
        number:
          min: 0
          max: 86400
          unit_of_measurement: s

smart_dosing:
  name: Smart Dosing
  description: Manual or automatic dosing control
  target:
    entity:
      integration: violet_pool_controller
      domain: switch
  fields:
    dosing_type:
      description: Type of dosing chemical
      required: true
      selector:
        select:
          options:
            - "pH-"
            - "pH+"
            - Chlorine
            - Electrolysis
            - Flocculant
    action:
      description: Dosing action
      required: true
      selector:
        select:
          options:
            - manual_dose
            - auto
            - stop
    duration:
      description: Dosing duration in seconds
      default: 30
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: s
    safety_override:
      description: Override safety interval between dosing cycles
      default: false
      selector:
        boolean:

manage_pv_surplus:
  name: PV Surplus Management
  description: Control PV surplus mode
  target:
    entity:
      integration: violet_pool_controller
      domain: switch
  fields:
    mode:
      description: PV surplus mode
      required: true
      selector:
        select:
          options:
            - activate
            - deactivate
            - auto
    pump_speed:
      description: Pump speed for PV mode (1-3)
      default: 2
      selector:
        number:
          min: 1
          max: 3
          mode: slider

control_dmx_scenes:
  name: DMX Scene Control
  description: Control DMX lighting scenes
  fields:
    device_id:
      description: Target device
      required: true
      selector:
        device:
          integration: violet_pool_controller
    action:
      description: DMX action
      required: true
      selector:
        select:
          options:
            - all_on
            - all_off
            - all_auto
            - sequence
            - party_mode
    sequence_delay:
      description: Delay between scenes in sequence mode (seconds)
      default: 2
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: s

set_light_color_pulse:
  name: Light Color Pulse
  description: Send color pulse command to pool lighting
  target:
    entity:
      integration: violet_pool_controller
      domain: switch
  fields:
    pulse_count:
      description: Number of color pulses
      default: 1
      selector:
        number:
          min: 1
          max: 10
    pulse_interval:
      description: Interval between pulses in milliseconds
      default: 500
      selector:
        number:
          min: 100
          max: 2000
          unit_of_measurement: ms

manage_digital_rules:
  name: Digital Rules Management
  description: Manage digital input automation rules
  fields:
    device_id:
      description: Target device
      required: true
      selector:
        device:
          integration: violet_pool_controller
    rule_key:
      description: Rule to manage
      required: true
      selector:
        select:
          options:
            - DIRULE_1
            - DIRULE_2
            - DIRULE_3
            - DIRULE_4
            - DIRULE_5
            - DIRULE_6
            - DIRULE_7
    action:
      description: Rule action
      required: true
      selector:
        select:
          options:
            - trigger
            - lock
            - unlock

test_output:
  name: Output Test Mode
  description: Temporarily activate a controller output for diagnostics
  fields:
    device_id:
      description: Target device
      required: true
      selector:
        device:
          integration: violet_pool_controller
    output:
      description: "Output identifier (e.g. PUMP, HEATER, SOLAR)"
      required: true
      selector:
        text:
    mode:
      description: "Test mode: SWITCH toggles, ON forces on, OFF forces off"
      default: SWITCH
      selector:
        select:
          options:
            - SWITCH
            - "ON"
            - "OFF"
    duration:
      description: Test duration in seconds
      default: 120
      selector:
        number:
          min: 1
          max: 900
          unit_of_measurement: s

export_diagnostic_logs:
  name: Export Diagnostic Logs
  description: Export recent integration logs for troubleshooting and support
  fields:
    device_id:
      description: Target device
      required: true
      selector:
        device:
          integration: violet_pool_controller
    lines:
      description: "Number of recent log lines to export (default: 100, max: 10000)"
      default: 100
      selector:
        number:
          min: 10
          max: 10000
          step: 10
          unit_of_measurement: lines
    include_timestamps:
      description: Include timestamps in exported log
      default: true
      selector:
        boolean:
    include_config:
      description: Include integration configuration in the export
      default: true
      selector:
        boolean:
    include_history:
      description: Include poll/error history in the export
      default: true
      selector:
        boolean:
    include_states:
      description: Include current entity states in the export
      default: true
      selector:
        boolean:
    include_raw_data:
      description: Include raw controller data in the export
      default: true
      selector:
        boolean:
    save_to_file:
      description: Save logs to file in /config/ directory
      default: false
      selector:
        boolean:

get_connection_status:
  name: Get Connection Status
  description: Get detailed connection status and health metrics for troubleshooting
  fields:
    device_id:
      description: Target device
      required: true
      selector:
        device:
          integration: violet_pool_controller

get_error_summary:
  name: Get Error Summary
  description: Get summary of recent errors and recovery suggestions
  fields:
    device_id:
      description: Target device
      required: true
      selector:
        device:
          integration: violet_pool_controller
    include_history:
      description: Include detailed error history
      default: false
      selector:
        boolean:

test_connection:
  name: Test Connection
  description: Test connection to the controller and return diagnostic information
  fields:
    device_id:
      description: Target device
      required: true
      selector:
        device:
          integration: violet_pool_controller

clear_error_history:
  name: Clear Error History
  description: Clear error history after successful recovery (use with caution)
  fields:
    device_id:
      description: Target device
      required: true
      selector:
        device:
          integration: violet_pool_controller

# === PHASE 2: HTTP CONTROL SERVICES ===

control_heater:
  name: Control Heater
  description: Control pool heater with temperature setpoint
  fields:
    action:
      description: Heater action (on/off)
      selector:
        select:
          options: ["on", "off"]
    target_temperature:
      description: Target temperature (10-60°C)
      selector:
        number:
          min: 10
          max: 60
          unit_of_measurement: "°C"

control_solar:
  name: Control Solar
  description: Control solar heating system
  fields:
    action:
      description: Solar action (on/off)
      selector:
        select:
          options: ["on", "off"]
    target_temperature:
      description: Target temperature (10-60°C)
      selector:
        number:
          min: 10
          max: 60
          unit_of_measurement: "°C"

control_cover:
  name: Control Cover
  description: Control pool cover (open/close/stop)
  fields:
    action:
      description: Cover action
      required: true
      selector:
        select:
          options: ["open", "close", "stop"]

control_backwash:
  name: Control Backwash
  description: Run or abort backwash cycle
  fields:
    action:
      description: Backwash action
      required: true
      selector:
        select:
          options: ["run", "abort"]

manual_dosing:
  name: Manual Dosing
  description: Manually trigger chemical dosing
  fields:
    dosing_system:
      description: Chemical dosing system
      required: true
      selector:
        select:
          options:
            - chlorine
            - electrolysis
            - ph_minus
            - ph_plus
            - flocculant
            - h2o2
    runtime_seconds:
      description: Runtime in seconds (1-3600)
      required: true
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: s

# === PHASE 2.5: DOSING CONFIGURATION ===

configure_dosing:
  name: Configure Dosing
  description: Set dosing system configuration parameter
  fields:
    dosing_system:
      description: Chemical dosing system
      required: true
      selector:
        select:
          options:
            - chlorine
            - electrolysis
            - ph_minus
            - ph_plus
            - flocculant
            - h2o2
    config_key:
      description: Configuration key
      required: true
      selector:
        text:
    value:
      description: Parameter value
      required: true
      selector:
        text:

set_dosing_target:
  name: Set Dosing Target
  description: Set dosing target value
  fields:
    dosing_system:
      description: Chemical dosing system
      required: true
      selector:
        select:
          options:
            - chlorine
            - electrolysis
            - ph_minus
            - ph_plus
            - flocculant
            - h2o2
    target_value:
      description: Target value (0-100)
      required: true
      selector:
        number:
          min: 0
          max: 100

set_dosing_daytime:
  name: Set Dosing Daytime
  description: Set dosing daytime window (HH:MM format)
  fields:
    dosing_system:
      description: Chemical dosing system
      required: true
      selector:
        select:
          options:
            - chlorine
            - electrolysis
            - ph_minus
            - ph_plus
            - flocculant
            - h2o2
    day_start:
      description: Day start time (HH:MM)
      selector:
        time:
    day_end:
      description: Day end time (HH:MM)
      selector:
        time:

set_dosing_max_daily:
  name: Set Dosing Maximum Daily
  description: Set maximum daily dosing volume
  fields:
    dosing_system:
      description: Chemical dosing system
      required: true
      selector:
        select:
          options:
            - chlorine
            - electrolysis
            - ph_minus
            - ph_plus
            - flocculant
            - h2o2
    max_daily_ml:
      description: Maximum daily volume (10-10000 ml)
      required: true
      selector:
        number:
          min: 10
          max: 10000
          unit_of_measurement: ml

enable_dosing:
  name: Enable Dosing
  description: Enable or disable dosing system
  fields:
    dosing_system:
      description: Chemical dosing system
      required: true
      selector:
        select:
          options:
            - chlorine
            - electrolysis
            - ph_minus
            - ph_plus
            - flocculant
            - h2o2
    enabled:
      description: Enable dosing
      required: true
      selector:
        boolean:

# === PHASE 3: RULE MANAGEMENT ===

configure_temp_rule:
  name: Configure Temperature Rule
  description: Configure temperature-based automation rule (TEMPRULE_1-8)
  fields:
    rule_id:
      description: Rule ID (1-8)
      required: true
      selector:
        number:
          min: 1
          max: 8
    enabled:
      description: Enable rule
      default: true
      selector:
        boolean:
    sensor_1:
      description: Primary sensor (1-8)
      selector:
        number:
          min: 1
          max: 8
    sensor_2:
      description: Secondary sensor (0=absolute, 1-8=sensor)
      selector:
        number:
          min: 0
          max: 8
    logic:
      description: Comparison logic
      selector:
        select:
          options: [">=", "<="]
    diff_value:
      description: Differential value
      selector:
        number:
    hyst_value:
      description: Hysteresis value
      selector:
        number:
    runtime_on:
      description: Runtime ON (HH:MM)
      selector:
        time:
    runtime_off:
      description: Runtime OFF (HH:MM)
      selector:
        time:
    output_1:
      description: Output 1 name
      selector:
        text:
    output_1_state:
      description: Output 1 state (0-6)
      selector:
        number:
          min: 0
          max: 6
    output_2:
      description: Output 2 name
      selector:
        text:
    output_2_state:
      description: Output 2 state (0-6)
      selector:
        number:
          min: 0
          max: 6
    output_3:
      description: Output 3 name
      selector:
        text:
    output_3_state:
      description: Output 3 state (0-6)
      selector:
        number:
          min: 0
          max: 6

configure_analog_rule:
  name: Configure Analog Input Rule
  description: Configure analog threshold-based rule (ANALOGRULE_1-8)
  fields:
    rule_id:
      description: Rule ID (1-8)
      required: true
      selector:
        number:
          min: 1
          max: 8
    enabled:
      description: Enable rule
      default: true
      selector:
        boolean:
    adc_input:
      description: ADC input (1-8)
      selector:
        number:
          min: 1
          max: 8
    logic:
      description: Comparison logic
      selector:
        select:
          options: [">=", "<="]
    threshold:
      description: Threshold value
      selector:
        number:
    hysteresis:
      description: Hysteresis value
      selector:
        number:
    runtime_on:
      description: Runtime ON (HH:MM)
      selector:
        time:
    runtime_off:
      description: Runtime OFF (HH:MM)
      selector:
        time:
    output_1:
      description: Output 1 name
      selector:
        text:
    output_1_state:
      description: Output 1 state (0-6)
      selector:
        number:
          min: 0
          max: 6
    output_2:
      description: Output 2 name
      selector:
        text:
    output_2_state:
      description: Output 2 state (0-6)
      selector:
        number:
          min: 0
          max: 6
    output_3:
      description: Output 3 name
      selector:
        text:
    output_3_state:
      description: Output 3 state (0-6)
      selector:
        number:
          min: 0
          max: 6

configure_switching_rule:
  name: Configure Switching Input Rule
  description: Configure digital input-based rule (SWITCHINGRULE_1-8)
  fields:
    rule_id:
      description: Rule ID (1-8)
      required: true
      selector:
        number:
          min: 1
          max: 8
    enabled:
      description: Enable rule
      default: true
      selector:
        boolean:
    di_input:
      description: Digital input (1-12)
      selector:
        number:
          min: 1
          max: 12
    contact_type:
      description: Contact type (0=NO, 1=NC)
      selector:
        number:
          min: 0
          max: 1
    output:
      description: Output name
      selector:
        text:
    action_on:
      description: Action ON state (0-6)
      selector:
        number:
          min: 0
          max: 6
    action_off:
      description: Action OFF state (0-6)
      selector:
        number:
          min: 0
          max: 6
    timeout:
      description: Timeout in seconds (0-3600)
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: s

configure_timer_rule:
  name: Configure Timer Rule
  description: Configure time-based automation rule (TIMERRULE_1-8)
  fields:
    rule_id:
      description: Rule ID (1-8)
      required: true
      selector:
        number:
          min: 1
          max: 8
    enabled:
      description: Enable rule
      default: true
      selector:
        boolean:
    on_time:
      description: ON time (HH:MM)
      selector:
        time:
    off_time:
      description: OFF time (HH:MM)
      selector:
        time:
    weekdays:
      description: Weekdays bitmask (0-127)
      selector:
        number:
          min: 0
          max: 127
    output_1:
      description: Output 1 name
      selector:
        text:
    output_1_state:
      description: Output 1 state (0-6)
      selector:
        number:
          min: 0
          max: 6
    output_2:
      description: Output 2 name
      selector:
        text:
    output_2_state:
      description: Output 2 state (0-6)
      selector:
        number:
          min: 0
          max: 6
    output_3:
      description: Output 3 name
      selector:
        text:
    output_3_state:
      description: Output 3 state (0-6)
      selector:
        number:
          min: 0
          max: 6

enable_rule:
  name: Enable/Disable Rule
  description: Enable or disable any rule type
  fields:
    rule_type:
      description: Rule type
      required: true
      selector:
        select:
          options:
            - temprule
            - analogrule
            - switchingrule
            - timerrule
    rule_id:
      description: Rule ID (1-8)
      required: true
      selector:
        number:
          min: 1
          max: 8
    enabled:
      description: Enable rule
      required: true
      selector:
        boolean:

# === PHASE 4: SYSTEM CONFIGURATION ===

control_extension_relay:
  name: Control Extension Relay
  description: Control extension relay outputs (EXT1_1 to EXT8_8)
  fields:
    relay_id:
      description: Relay ID (1-8)
      required: true
      selector:
        number:
          min: 1
          max: 8
    action:
      description: Control action
      default: "on"
      selector:
        select:
          options: ["on", "off", "toggle"]
    state:
      description: Direct state (0-6, overrides action)
      selector:
        number:
          min: 0
          max: 6
    duration:
      description: Duration in seconds
      default: 0
      selector:
        number:
          min: 0
          max: 86400
          unit_of_measurement: s

configure_sensor_calibration:
  name: Configure Sensor Calibration
  description: Configure temperature sensor calibration parameters
  fields:
    sensor_id:
      description: Sensor ID (1-12)
      required: true
      selector:
        number:
          min: 1
          max: 12
    offset:
      description: Temperature offset (-10 to +10°C)
      selector:
        number:
          min: -10
          max: 10
          step: 0.1
          unit_of_measurement: "°C"
    multiplier:
      description: Calibration multiplier (0.5 to 2.0)
      selector:
        number:
          min: 0.5
          max: 2.0
          step: 0.1
    min_value:
      description: Minimum valid value
      selector:
        number:
    max_value:
      description: Maximum valid value
      selector:
        number:

