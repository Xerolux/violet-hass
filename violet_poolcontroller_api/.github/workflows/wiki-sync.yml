name: Sync docs to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki

      - name: Sync docs content
        run: |
          rsync -av --delete --exclude '.git' docs/ /tmp/wiki/

      - name: Commit and push wiki changes
        working-directory: /tmp/wiki
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes detected."
          else
            git commit -m "docs: sync wiki from docs folder [skip ci]"
            git push origin HEAD
          fi
