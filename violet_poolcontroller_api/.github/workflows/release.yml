name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_mode:
        description: "Version mode"
        required: true
        type: choice
        options:
          - auto-patch
          - auto-minor
          - custom
        default: auto-patch
      custom_version:
        description: "Custom version (only used when mode = custom, e.g. 1.2.3)"
        required: false
        type: string
        default: ""
      changelog:
        description: "Changelog / Release notes (optional)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Determine next version
        id: version
        run: |
          import re, sys, subprocess, os

          mode = "${{ github.event.inputs.version_mode }}"
          custom = "${{ github.event.inputs.custom_version }}".strip()

          # Read current version from pyproject.toml
          with open("pyproject.toml") as f:
              content = f.read()
          m = re.search(r'version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content)
          if not m:
              print("ERROR: cannot parse version from pyproject.toml")
              sys.exit(1)

          major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))

          if mode == "custom":
              if not custom:
                  print("ERROR: custom_version is empty")
                  sys.exit(1)
              if not re.match(r"^\d+\.\d+\.\d+$", custom):
                  print(f"ERROR: invalid version format: {custom}")
                  sys.exit(1)
              new_version = custom
          elif mode == "auto-minor":
              new_version = f"{major}.{minor + 1}.0"
          else:
              new_version = f"{major}.{minor}.{patch + 1}"

          # Get last tag for changelog
          result = subprocess.run(
              ["git", "describe", "--tags", "--abbrev=0"],
              capture_output=True, text=True
          )
          last_tag = result.stdout.strip() if result.returncode == 0 else ""

          commits = ""
          if last_tag:
              result = subprocess.run(
                  ["git", "log", "--oneline", f"{last_tag}..HEAD"],
                  capture_output=True, text=True
              )
              commits = result.stdout.strip()

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              print(f"version={new_version}", file=out)
              print(f"last_tag={last_tag}", file=out)

          # Write commit log to file for later use
          with open("/tmp/commit_log.txt", "w") as f:
              f.write(commits)

        shell: python {0}

      - name: Bump version in pyproject.toml and setup.py
        run: |
          NEW="${{ steps.version.outputs.version }}"

          sed -i "s/version = \".*\"/version = \"${NEW}\"/" pyproject.toml
          sed -i "s/version=\".*\"/version=\"${NEW}\"/" setup.py

          echo "Bumped to ${NEW}"
          grep "version" pyproject.toml
          grep "version" setup.py

      - name: Build changelog
        id: changelog
        run: |
          NEW="${{ steps.version.outputs.version }}"
          LAST="${{ steps.version.outputs.last_tag }}"
          USER_INPUT="${{ github.event.inputs.changelog }}"

          COMMIT_LOG=$(cat /tmp/commit_log.txt)

          BODY="## v${NEW}\n\n"

          if [ -n "$USER_INPUT" ]; then
            BODY+="${USER_INPUT}\n\n"
          fi

          if [ -n "$COMMIT_LOG" ]; then
            BODY+="### Commits since ${LAST}\n\n"
            while IFS= read -r line; do
              BODY+="- ${line}\n"
            done <<< "$COMMIT_LOG"
            BODY+="\n"
          fi

          BODY+="### Installation\n\`\`\`bash\npip install violet-poolController-api==${NEW}\n\`\`\`\n"

          # Write to file for release notes
          echo -e "$BODY" > RELEASE_NOTES_v${NEW}.md
          echo "file=RELEASE_NOTES_v${NEW}.md" >> "$GITHUB_OUTPUT"

      - name: Commit, tag and push
        run: |
          NEW="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml setup.py RELEASE_NOTES_v${NEW}.md
          git commit -m "chore: bump version to ${NEW}"
          git tag v${NEW}
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW="${{ steps.version.outputs.version }}"
          NOTES_FILE="${{ steps.changelog.outputs.file }}"
          gh release create v${NEW} \
            --title "v${NEW}" \
            --notes-file "${NOTES_FILE}" \
            --latest

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI }}
