name: Validate Integration

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'custom_components/violet_pool_controller/**'
      - '.github/workflows/validate.yml'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'tox.ini'
  pull_request:
    branches: [main]
  release:
    types: [published, prereleased]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            tox-env: "py312"
            allow-prereleases: false
          - python-version: "3.13"
            tox-env: "py313"
            allow-prereleases: false
          - python-version: "3.14"
            tox-env: "py314"
            allow-prereleases: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases }}

      - name: Install tox
        run: |
          python -m pip install --upgrade pip tox

      - name: Run tox (${{ matrix.tox-env }})
        run: tox -e ${{ matrix.tox-env }}

  hassfest:
    runs-on: ubuntu-latest
    name: Hassfest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@v1.1.0

  hacs:
    runs-on: ubuntu-latest
    name: HACS
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@22.10.5
        with:
          category: integration

  summary:
    runs-on: ubuntu-latest
    needs: [validate, hassfest, hacs]
    if: always()
    steps:
      - name: Final Summary
        run: |
          echo "## Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests (tox) | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hassfest | ${{ needs.hassfest.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HACS | ${{ needs.hacs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.validate.result }}" == "success" ]] && \
             [[ "${{ needs.hassfest.result }}" == "success" ]] && \
             [[ "${{ needs.hacs.result }}" == "success" ]]; then
            echo "All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "Some checks did not pass. Please review the logs." >> $GITHUB_STEP_SUMMARY
          fi
