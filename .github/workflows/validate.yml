name: Validate Integration

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/violet_pool_controller/**'
      - '.github/workflows/validate.yml'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'tox.ini'
  pull_request:
    branches: [main]
    paths:
      - 'custom_components/violet_pool_controller/**'
      - '.github/workflows/validate.yml'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'tox.ini'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            tox-env: "py312"
          - python-version: "3.14"
            tox-env: "py314"
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install tox
        run: |
          python -m pip install --upgrade pip tox

      - name: Run tox (${{ matrix.tox-env }})
        run: tox -e ${{ matrix.tox-env }}
        
      - name: Create validation summary
        if: always()
        run: |
          echo "## ✅ Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Python:** ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tox Environment:** ${{ matrix.tox-env }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All validation checks completed!" >> $GITHUB_STEP_SUMMARY

  summary:
    runs-on: ubuntu-latest
    needs: [validate]
    if: always()
    steps:
      - name: Final Summary
        run: |
          echo "## 🎯 Integration Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.validate.result }}" == "success" ]]; then
            echo "✅ **All checks passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some checks did not pass. Please review the logs.**" >> $GITHUB_STEP_SUMMARY
          fi
