name: Sync API Version

on:
  push:
    branches: [main]
    paths:
      - "violet_poolcontroller_api/pyproject.toml"
  workflow_dispatch:

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract API version from pyproject.toml
        id: extract
        run: |
          API_VERSION=$(python3 -c "
          import tomllib
          with open('violet_poolcontroller_api/pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          echo "api_version=$API_VERSION" >> $GITHUB_OUTPUT
          echo "API version: $API_VERSION"

      - name: Update manifest.json requirements
        env:
          API_VERSION: ${{ steps.extract.outputs.api_version }}
        run: |
          python3 -c "
          import json
          import os

          API_VERSION = os.environ['API_VERSION']

          manifest_file = 'custom_components/violet_pool_controller/manifest.json'
          with open(manifest_file, 'r') as f:
              data = json.load(f)

          new_req = f'violet-poolController-api>={API_VERSION}'
          old_reqs = data.get('requirements', [])

          updated = False
          new_reqs = []
          for req in old_reqs:
              if req.startswith('violet-poolController-api'):
                  if req != new_req:
                      new_reqs.append(new_req)
                      updated = True
                      print(f'Updated: {req} -> {new_req}')
                  else:
                      new_reqs.append(req)
              else:
                  new_reqs.append(req)

          if updated:
              data['requirements'] = new_reqs
              with open(manifest_file, 'w') as f:
                  json.dump(data, f, indent=2)
                  f.write('\n')
              print('manifest.json updated')
          else:
              print('No changes needed')
          "

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/violet_pool_controller/manifest.json
          git commit -m "chore: sync API version to ${{ steps.extract.outputs.api_version }} in manifest.json"
          git push
