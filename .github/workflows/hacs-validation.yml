name: HACS Validation

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published, prereleased]
  workflow_dispatch:

jobs:
  hacs:
    runs-on: ubuntu-latest
    name: HACS Action
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
