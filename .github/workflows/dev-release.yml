name: Dev Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  dev-release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, '📝 Release')"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine version and tag
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/violet_pool_controller/manifest.json'))['version'])")
          VERSION="${VERSION%-dev*}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-dev.${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building dev release: $TAG"

      - name: Delete previous dev releases for this version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Cleaning up old dev releases for v${VERSION}..."

          OLD_TAGS=$(git tag -l "v${VERSION}-dev.*")
          if [ -n "$OLD_TAGS" ]; then
            echo "Found old tags:"
            echo "$OLD_TAGS"
            echo "$OLD_TAGS" | while read -r old_tag; do
              echo "Deleting release and tag: $old_tag"
              gh release delete "$old_tag" --yes --cleanup-tag 2>/dev/null || true
            done
          else
            echo "No previous dev releases to clean up."
          fi

      - name: Patch version into files for dev build
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DEV_VERSION="${TAG#v}"
          MANIFEST="custom_components/violet_pool_controller/manifest.json"
          CONST="custom_components/violet_pool_controller/const.py"

          sed -i "s|\"version\": \"[^\"]*\"|\"version\": \"$DEV_VERSION\"|" "$MANIFEST"
          sed -i "s|^INTEGRATION_VERSION = .*|INTEGRATION_VERSION = \"$DEV_VERSION\"|" "$CONST"
          echo "Patched version to $DEV_VERSION in ZIP files"

      - name: Create ZIP artifact
        run: |
          cd custom_components/violet_pool_controller
          zip -r ../../violet_pool_controller.zip . \
            -x "*.pyc" -x "__pycache__/*" -x "*.git*" -x "test_*.py" -x ".DS_Store"
          cd ../..
          SIZE=$(du -h violet_pool_controller.zip | cut -f1)
          echo "Created violet_pool_controller.zip ($SIZE)"
          sha256sum violet_pool_controller.zip > violet_pool_controller.zip.sha256

      - name: Get commit log since last stable release
        id: commits
        run: |
          LAST_STABLE=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -n "$LAST_STABLE" ]; then
            ALL_COMMITS=$(git log ${LAST_STABLE}..HEAD --oneline --pretty=format:"- %s (%h)")
          else
            ALL_COMMITS=$(git log --oneline --pretty=format:"- %s (%h)" | head -50)
          fi

          BUG_FIXES=$(echo "$ALL_COMMITS" | grep -iE "(\bfix\b|\bbug\b|\bpatch\b|hotfix|bugfix)" || echo "")
          IMPROVEMENTS=$(echo "$ALL_COMMITS" | grep -iE "(\bimprove\b|\benhance\b|\bupdate\b|\brefactor\b|\boptimize\b|\bchore\b)" || echo "")
          NEW_FEATURES=$(echo "$ALL_COMMITS" | grep -iE "(\badd\b|\bfeat\b|\bfeature\b|\bnew\b)" || echo "")
          OTHER=$(echo "$ALL_COMMITS" | grep -viE "(\bfix\b|\bbug\b|\bpatch\b|hotfix|bugfix|\bimprove\b|\benhance\b|\bupdate\b|\brefactor\b|\boptimize\b|\bchore\b|\badd\b|\bfeat\b|\bfeature\b|\bnew\b|\bRelease\b)" || echo "")

          echo "bug-fixes<<EOF" >> $GITHUB_OUTPUT
          echo "$BUG_FIXES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "improvements<<EOF" >> $GITHUB_OUTPUT
          echo "$IMPROVEMENTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "new-features<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_FEATURES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "other<<EOF" >> $GITHUB_OUTPUT
          echo "$OTHER" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "last-stable=$LAST_STABLE" >> $GITHUB_OUTPUT

      - name: Create dev release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: true
          draft: false
          make_latest: false
          files: |
            violet_pool_controller.zip
            violet_pool_controller.zip.sha256
          body: |
            ## ${{ steps.version.outputs.tag }} — Dev Build

            > **DEV RELEASE** — Auto-generated from commit `${{ github.sha }}`

            ### ❤️ Support | Unterstützung

            If you find this integration useful, consider supporting the developer. Every contribution, no matter how small, is a huge motivation to improve the project and keep it alive! Thank you! 🙏

            Jeder kleine Beitrag hilft, die Motivation hochzuhalten, um das Projekt weiter zu verbessern und am Leben zu erhalten! Vielen Dank! 🙏

            - 💳 **[PayPal](https://paypal.me/xerolux)**
            - ☕ **[Buy Me a Coffee](https://buymeacoffee.com/xerolux)**
            - 🚗 **[Tesla Referral Code](https://ts.la/sebastian564489)**
            - ⭐ **[Star this repository](https://github.com/${{ github.repository }})**

            ---

            ${{ steps.commits.outputs.new-features && '### ✨ New Features | Neue Funktionen

            ' || '' }}${{ steps.commits.outputs.new-features }}

            ${{ steps.commits.outputs.improvements && '### 🚀 Improvements | Verbesserungen

            ' || '' }}${{ steps.commits.outputs.improvements }}

            ${{ steps.commits.outputs.bug-fixes && '### 🔧 Bug Fixes | Fehlerbehebungen

            ' || '' }}${{ steps.commits.outputs.bug-fixes }}

            ${{ steps.commits.outputs.other && '### 📋 Other | Sonstiges

            ' || '' }}${{ steps.commits.outputs.other }}

            ---

            - **Branch:** `${{ github.ref_name }}`
            - **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - **Base:** ${{ steps.commits.outputs.last-stable || 'Initial commit' }}

            ${{ steps.commits.outputs.last-stable && format('[Full changelog: {0}...{1}]({2}/compare/{0}...{1})', steps.commits.outputs.last-stable, steps.version.outputs.tag, github.server_url) || '' }}

            ---

            ### 📦 Installation

            **HACS (show beta releases enabled):**
            1. Add custom repository: `${{ github.repository }}`
            2. Search for "Violet Pool Controller"
            3. Click Install

            **Manual:**
            1. Download `violet_pool_controller.zip`
            2. Extract to `custom_components/violet_pool_controller`
            3. Restart Home Assistant

            ---

            - 🐛 **[Report a bug](https://github.com/${{ github.repository }}/issues/new?template=bug_report.md)**
            - 💡 **[Request a feature](https://github.com/${{ github.repository }}/issues/new?template=feature_request.md)**
