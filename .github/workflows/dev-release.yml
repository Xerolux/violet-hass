name: Dev Pre-Release

on:
  push:
    branches: [main]
    paths:
      - "violet_poolcontroller_api/**"
      - "tests/**"
      - "pyproject.toml"
      - "setup.py"
      - "tox.ini"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dev-release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump dev version')"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version, bump files, and compute tag
        id: version
        run: |
          import re, subprocess, os

          with open("pyproject.toml") as f:
              content = f.read()
          m = re.search(r'version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content)
          if not m:
              raise SystemExit("ERROR: cannot parse version from pyproject.toml")

          major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))
          current_version = f"{major}.{minor}.{patch}"

          result = subprocess.run(
              ["git", "tag", "-l", "--sort=-version:refname"],
              capture_output=True, text=True
          )
          tags = [t.strip() for t in result.stdout.strip().splitlines() if t.strip()]
          stable_tags = [t for t in tags if re.match(r"^v\d+\.\d+\.\d+$", t)]
          last_stable = stable_tags[0] if stable_tags else ""

          last_stable_ver = last_stable.lstrip("v") if last_stable else "0.0.0"
          ls_m = re.match(r"(\d+)\.(\d+)\.(\d+)", last_stable_ver)
          ls_major, ls_minor, ls_patch = int(ls_m.group(1)), int(ls_m.group(2)), int(ls_m.group(3))

          current_tuple = (major, minor, patch)
          stable_tuple = (ls_major, ls_minor, ls_patch)

          if current_tuple <= stable_tuple:
              dev_version = f"{major}.{minor}.{patch + 1}"
          else:
              dev_version = current_version

          dm = re.match(r"(\d+)\.(\d+)\.(\d+)", dev_version)
          dev_major, dev_minor, dev_patch = dm.group(1), dm.group(2), dm.group(3)

          with open("pyproject.toml") as f:
              content = f.read()
          content = re.sub(
              r'version\s*=\s*"\d+\.\d+\.\d+"',
              f'version = "{dev_version}"',
              content
          )
          with open("pyproject.toml", "w") as f:
              f.write(content)

          with open("setup.py") as f:
              content = f.read()
          content = re.sub(
              r'version="\d+\.\d+\.\d+"',
              f'version="{dev_version}"',
              content
          )
          with open("setup.py", "w") as f:
              f.write(content)

          short_sha = subprocess.run(
              ["git", "rev-parse", "--short", "HEAD"],
              capture_output=True, text=True
          ).stdout.strip()

          dev_tag = f"v{dev_version}-dev.{short_sha}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              print(f"dev_version={dev_version}", file=out)
              print(f"dev_tag={dev_tag}", file=out)
              print(f"last_stable={last_stable}", file=out)
        shell: python {0}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml setup.py
          git diff --cached --quiet || git commit -m "chore: bump dev version to ${{ steps.version.outputs.dev_version }}"
          git push origin main

      - name: Delete previous dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Looking for existing dev pre-releases for v${{ steps.version.outputs.dev_version }}..."
          for tag in $(gh release list --limit 50 --json tagName --jq '.[].tagName' | grep "^v${{ steps.version.outputs.dev_version }}-dev\." || true); do
            echo "Deleting old dev release: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done

      - name: Create dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEV_TAG="${{ steps.version.outputs.dev_tag }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          LAST_STABLE="${{ steps.version.outputs.last_stable }}"

          if [ -n "$LAST_STABLE" ]; then
            COMMIT_COUNT=$(git rev-list "${LAST_STABLE}"..HEAD --count 2>/dev/null || echo "0")
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi

          gh release create "${DEV_TAG}" \
            --prerelease \
            --title "v${{ steps.version.outputs.dev_version }}-dev.${SHORT_SHA}" \
            --notes "Auto pre-release from commit \`${SHORT_SHA}\`

**${COMMIT_MSG}**

Commits since ${LAST_STABLE}: ${COMMIT_COUNT}
SHA: \`${SHORT_SHA}\`

> This is an automated development pre-release.
> It replaces any previous \`-dev.*\` pre-release for v${{ steps.version.outputs.dev_version }}.

### Installation
\`\`\`bash
pip install violet-poolController-api==${{ steps.version.outputs.dev_version }}.dev0
\`\`\`"
