[tox]
envlist = py312,py313,py314,lint
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run unit tests
extras = test
commands =
    pytest -q tests/test_api.py

[testenv:lint]
description = Run static lint checks
deps =
    ruff>=0.9.0
commands =
    ruff check violet_poolcontroller_api tests
