[tox]
envlist = py312,py313,py314
skip_missing_interpreters = true

[testenv]
description = Run integration checks for the Home Assistant custom component
; The repo root is not an installable package (HA custom component monorepo);
; without this, tox tries to build it and setuptools flat-layout discovery fails.
package = skip
deps =
    py312: ruff>=0.15.0
    py313,py314: -r requirements-dev.txt
commands =
    py312: ruff check custom_components/violet_pool_controller
    py313,py314: pytest tests -v --tb=short --cov=custom_components/violet_pool_controller --cov-report=xml --cov-report=term-missing
