# =============================================================================
# Violet Pool Controller - Kompakte Dashboard-Karte
# =============================================================================
#
# Diese Konfiguration erstellt eine kompakte Dashboard-Karte mit den
# wichtigsten Steuerungselementen für Ihren Pool.
#
# PERFEKT FÜR: Mobile Geräte, Übersichtsseiten, Tablets
#
# VERSION: 1.0.3-alpha.1 (2026-02-06)
# =============================================================================

type: entities
title: 🏊 Pool-Controller
show_header_toggle: false
state_color: true
entities:
  # Schnellsteuerung
  - type: section
    label: Steuerung
  - entity: switch.violet_pool_controller_pump
    name: Pumpe
    icon: mdi:water-pump
  - entity: number.violet_pool_controller_pump_speed
    name: Geschwindigkeit
  - entity: switch.violet_pool_controller_heater
    name: Heizung
    icon: mdi:radiator
  - entity: number.violet_pool_controller_heater_target_temp
    name: Zieltemp.

  # Wasserqualität
  - type: section
    label: Wasserqualität
  - entity: sensor.violet_pool_controller_ph_value
    name: pH
    icon: mdi:flask
  - entity: sensor.violet_pool_controller_orp_value
    name: Redox
    icon: mdi:flash
  - entity: sensor.violet_pool_controller_pool_temperature
    name: Temperatur
    icon: mdi:thermometer-water

  # Status
  - type: section
    label: Status
  - entity: binary_sensor.violet_pool_controller_connection
    name: Verbindung
    icon: mdi:lan-connect
