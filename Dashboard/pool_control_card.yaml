# =============================================================================
# Violet Pool Controller - Dashboard Card Configuration
# =============================================================================
#
# Diese Konfiguration erstellt eine übersichtliche Dashboard-Karte für die
# vollständige Steuerung und Überwachung Ihres Pool-Controllers.
#
# INSTALLATION:
# 1. Öffnen Sie Ihr Home Assistant Dashboard im Bearbeitungsmodus
# 2. Fügen Sie eine neue Karte hinzu (+ Karte hinzufügen)
# 3. Wählen Sie "Manuell" oder "Code-Editor"
# 4. Kopieren Sie diese Konfiguration und passen Sie entity_ids an
# 5. Speichern Sie die Karte
#
# HINWEIS: 
# - Ersetzen Sie "violet_pool_controller" durch Ihren Device-Namen
#   (Standard: "violet_pool_controller" → Entity-ID-Prefix)
# - Bei mehreren Controllern oder geändertem Namen:
#   Entwicklerwerkzeuge → Zustände → Nach "violet" suchen
#
# VERSION: 1.0.3-alpha.1 (2026-02-06)
# =============================================================================

type: vertical-stack
cards:
  # =============================================================================
  # HAUPT-STEUERUNG (Pumpe, Heizung, Solar)
  # =============================================================================
  - type: entities
    title: 🏊 Pool-Steuerung
    show_header_toggle: false
    entities:
      # Pumpe - Modus & Geschwindigkeit
      - type: section
        label: Filterpumpe
      - entity: switch.violet_pool_controller_pump
        name: Modus
        icon: mdi:water-pump
      - entity: number.violet_pool_controller_pump_speed
        name: Geschwindigkeit
        icon: mdi:speedometer
      - entity: sensor.violet_pool_controller_pump_runtime
        name: Laufzeit
        icon: mdi:clock-outline

      # Heizung - Modus & Temperatur
      - type: section
        label: Heizung
      - entity: switch.violet_pool_controller_heater
        name: Modus
        icon: mdi:radiator
      - entity: number.violet_pool_controller_heater_target_temp
        name: Zieltemperatur
        icon: mdi:thermometer
      - entity: sensor.violet_pool_controller_pool_temperature
        name: Ist-Temperatur
        icon: mdi:thermometer-water

      # Solar - Modus & Temperatur
      - type: section
        label: Solarabsorber
      - entity: switch.violet_pool_controller_solar
        name: Modus
        icon: mdi:solar-power
      - entity: number.violet_pool_controller_solar_target_temp
        name: Zieltemperatur
        icon: mdi:thermometer
      - entity: sensor.violet_pool_controller_solar_temperature
        name: Kollektortemperatur
        icon: mdi:thermometer-lines

  # =============================================================================
  # WASSERQUALITÄT
  # =============================================================================
  - type: entities
    title: 💧 Wasserqualität
    show_header_toggle: false
    entities:
      # pH-Kontrolle
      - type: section
        label: pH-Wert
      - entity: sensor.violet_pool_controller_ph_value
        name: Aktueller pH
        icon: mdi:flask
      - entity: number.violet_pool_controller_ph_setpoint
        name: Sollwert
        icon: mdi:flask-outline
      - entity: switch.violet_pool_controller_dos_4_phm
        name: pH- Modus
        icon: mdi:flask-minus
      - entity: switch.violet_pool_controller_dos_5_php
        name: pH+ Modus
        icon: mdi:flask-plus

      # Chlor-Kontrolle
      - type: section
        label: Desinfektion
      - entity: sensor.violet_pool_controller_orp_value
        name: Redox (ORP)
        icon: mdi:flash
      - entity: number.violet_pool_controller_orp_setpoint
        name: ORP Sollwert
        icon: mdi:flash-outline
      - entity: sensor.violet_pool_controller_chlorine_level
        name: Chlor
        icon: mdi:test-tube
      - entity: number.violet_pool_controller_chlorine_setpoint
        name: Chlor Sollwert
        icon: mdi:test-tube-empty
      - entity: switch.violet_pool_controller_dos_1_cl
        name: Chlor-Dosierung Modus
        icon: mdi:test-tube

  # =============================================================================
  # TEMPERATUREN ÜBERSICHT
  # =============================================================================
  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.violet_pool_controller_pool_temperature
        name: Becken
        min: 10
        max: 35
        severity:
          green: 24
          yellow: 20
          red: 10
        needle: true

      - type: gauge
        entity: sensor.violet_pool_controller_solar_temperature
        name: Solar
        min: 10
        max: 60
        severity:
          green: 30
          yellow: 20
          red: 10
        needle: true

      - type: gauge
        entity: sensor.violet_pool_controller_ambient_temperature
        name: Außen
        min: -10
        max: 40
        severity:
          green: 15
          yellow: 5
          red: -10
        needle: true

  # =============================================================================
  # WASSERCHEMIE GRAPH
  # =============================================================================
  - type: history-graph
    title: 📊 Wasserchemie (24h)
    hours_to_show: 24
    refresh_interval: 300
    entities:
      - entity: sensor.violet_pool_controller_ph_value
        name: pH
      - entity: sensor.violet_pool_controller_orp_value
        name: Redox
      - entity: sensor.violet_pool_controller_chlorine_level
        name: Chlor

  # =============================================================================
  # ERWEITERTE STEUERUNG (Optional)
  # =============================================================================
  - type: entities
    title: ⚙️ Erweiterte Steuerung
    show_header_toggle: false
    entities:
      # Beleuchtung
      - entity: switch.violet_pool_controller_light
        name: Beleuchtung
        icon: mdi:lightbulb

      # PV-Überschuss
      - entity: switch.violet_pool_controller_pvsurplus
        name: PV-Überschuss
        icon: mdi:solar-power-variant

      # Abdeckung (falls vorhanden)
      - entity: cover.violet_pool_controller_cover
        name: Abdeckung
        icon: mdi:window-shutter

  # =============================================================================
  # SYSTEM-STATUS
  # =============================================================================
  - type: entities
    title: 🔧 System
    show_header_toggle: false
    state_color: true
    entities:
      - entity: binary_sensor.violet_pool_controller_connection
        name: Verbindung
        icon: mdi:lan-connect
      - entity: sensor.violet_pool_controller_error_code
        name: Fehlerstatus
        icon: mdi:alert-circle
      - entity: sensor.violet_pool_controller_last_calibration
        name: Letzte Kalibrierung
        icon: mdi:wrench-clock
